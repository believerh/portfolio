<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Admin Panel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--primary: #6366f1;
--secondary: #8b5cf6;
--accent: #06b6d4;
--dark: #0a0a0f;
--dark-surface: #12121a;
--text: #e2e8f0;
--text-muted: #94a3b8;
--danger: #ef4444;
--success: #10b981;
}

body {
font-family: 'Inter', system-ui, -apple-system, sans-serif;
background: var(--dark);
color: var(--text);
min-height: 100vh;
padding: 40px 20px;
}

.container {
max-width: 700px;
margin: 0 auto;
}

.header {
text-align: center;
margin-bottom: 50px;
}

.header h1 {
font-size: 2.5rem;
font-weight: 700;
background: linear-gradient(135deg, var(--primary), var(--accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 10px;
}

.header p {
color: var(--text-muted);
font-size: 0.95rem;
}

.admin-card {
background: rgba(18, 18, 26, 0.7);
backdrop-filter: blur(20px);
border: 1px solid rgba(99, 102, 241, 0.2);
border-radius: 24px;
padding: 45px;
box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
}

.form-group {
margin-bottom: 28px;
}

label {
display: block;
font-size: 0.85rem;
font-weight: 500;
color: var(--text-muted);
margin-bottom: 10px;
letter-spacing: 0.5px;
text-transform: uppercase;
}

input[type="text"],
textarea {
width: 100%;
padding: 15px 20px;
background: rgba(255, 255, 255, 0.03);
border: 1px solid rgba(255, 255, 255, 0.1);
border-radius: 12px;
color: var(--text);
font-family: inherit;
font-size: 0.95rem;
transition: all 0.3s ease;
}

input[type="text"]:focus,
textarea:focus {
outline: none;
border-color: var(--primary);
background: rgba(99, 102, 241, 0.05);
box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

textarea {
min-height: 120px;
resize: vertical;
font-family: 'Inter', sans-serif;
line-height: 1.6;
}

input[type="file"] {
display: none;
}

.file-upload {
display: flex;
align-items: center;
gap: 20px;
padding: 20px;
background: rgba(255, 255, 255, 0.02);
border: 2px dashed rgba(255, 255, 255, 0.1);
border-radius: 12px;
cursor: pointer;
transition: all 0.3s ease;
}

.file-upload:hover {
border-color: var(--primary);
background: rgba(99, 102, 241, 0.05);
}

.file-upload-icon {
font-size: 2rem;
opacity: 0.6;
}

.file-upload-text {
flex: 1;
}

.file-upload-text strong {
display: block;
color: var(--text);
margin-bottom: 4px;
}

.file-upload-text span {
font-size: 0.85rem;
color: var(--text-muted);
}

#fileName {
color: var(--accent);
font-size: 0.9rem;
word-break: break-all;
}

.avatar-preview {
width: 100px;
height: 100px;
border-radius: 50%;
background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
border: 2px solid rgba(255, 255, 255, 0.1);
overflow: hidden;
flex-shrink: 0;
}

.avatar-preview img {
width: 100%;
height: 100%;
object-fit: cover;
}

.button-group {
display: flex;
gap: 16px;
margin-top: 40px;
}

.btn {
flex: 1;
padding: 18px 30px;
border-radius: 14px;
text-decoration: none;
font-weight: 600;
font-size: 0.95rem;
letter-spacing: 0.3px;
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
display: inline-flex;
align-items: center;
justify-content: center;
gap: 10px;
cursor: pointer;
border: none;
font-family: inherit;
}

.btn-primary {
background: linear-gradient(135deg, var(--primary), var(--secondary));
color: #ffffff;
box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
}

.btn-primary:hover {
transform: translateY(-3px) scale(1.02);
box-shadow: 0 16px 40px rgba(99, 102, 241, 0.4);
}

.btn-secondary {
background: rgba(255, 255, 255, 0.03);
color: var(--text);
border: 1px solid rgba(255, 255, 255, 0.1);
}

.btn-secondary:hover {
background: rgba(255, 255, 255, 0.06);
border-color: rgba(255, 255, 255, 0.2);
transform: translateY(-3px);
}

.status {
margin-top: 30px;
padding: 16px 20px;
border-radius: 12px;
font-size: 0.9rem;
text-align: center;
display: none;
}

.status.success {
background: rgba(16, 185, 129, 0.1);
border: 1px solid rgba(16, 185, 129, 0.3);
color: var(--success);
}

.status.error {
background: rgba(239, 68, 68, 0.1);
border: 1px solid rgba(239, 68, 68, 0.3);
color: var(--danger);
}

.info-box {
background: rgba(6, 182, 212, 0.05);
border: 1px solid rgba(6, 182, 212, 0.2);
border-radius: 12px;
padding: 18px 22px;
margin-bottom: 35px;
font-size: 0.9rem;
color: var(--text-muted);
line-height: 1.6;
}

.info-box strong {
color: var(--accent);
}

@media (max-width: 640px) {
.admin-card { padding: 30px 25px; }
.header h1 { font-size: 2rem; }
.button-group { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>⚙ Profile Admin</h1>
<p>Manage your futuristic profile content</p>
</div>

<div class="admin-card">

<div class="info-box">
<strong>Instructions:</strong> Edit the fields below and click <strong>"Update Profile"</strong> to generate a new <code>index.html</code> file. Download it and replace your existing profile page.
</div>

<div class="form-group">
<label for="profileName">Display Name</label>
<input type="text" id="profileName" value="OG Believer" placeholder="Enter your name">
</div>

<div class="form-group">
<label for="profileRole">Role / Title</label>
<input type="text" id="profileRole" value="Programmer and Developer" placeholder="e.g. Full Stack Developer">
</div>

<div class="form-group">
<label for="profileBio">Bio</label>
<textarea id="profileBio" placeholder="Write a short bio about yourself...">Building the future, one commit at a time. Passionate about crafting seamless digital experiences with cutting-edge technology and minimalist design.</textarea>
</div>

<div class="form-group">
<label>Profile Picture</label>
<div class="file-upload" onclick="document.getElementById('profilePic').click()">
<div class="avatar-preview" id="avatarPreview">👨‍💻</div>
<div class="file-upload-text">
<strong>Click to upload image</strong>
<span>or drag and drop (PNG, JPG, GIF)</span>
</div>
</div>
<input type="file" id="profilePic" accept="image/*">
<p id="fileName" style="margin-top: 10px; font-size: 0.85rem; color: var(--text-muted);"></p>
</div>

<div class="form-group">
<label for="githubLink">GitHub URL</label>
<input type="text" id="githubLink" value="https://github.com/believerrh" placeholder="https://github.com/username">
</div>

<div class="form-group">
<label for="whatsappLink">WhatsApp Link</label>
<input type="text" id="whatsappLink" value="https://wa.me/233534970884" placeholder="https://wa.me/1234567890">
</div>

<div class="form-group">
<label for="adminPassword">Admin Password</label>
<input type="password" id="adminPassword" placeholder="Enter admin password" value="admin123">
</div>

<div class="form-group">
<label for="adminPassword">Admin Password</label>
<input type="password" id="adminPassword" placeholder="Enter admin password" value="admin123">
</div>

<div class="button-group">
<button class="btn btn-primary" onclick="updateProfile()">
<span>⬇</span> Update Profile
</button>
<button class="btn btn-secondary" onclick="resetForm()">
<span>↺</span> Reset
</button>
</div>

<div class="status" id="status"></div>
</div>
</div>

<script>
let uploadedImageData = null;

document.getElementById('profilePic').addEventListener('change', function(e) {
const file = e.target.files[0];
if (file) {
document.getElementById('fileName').textContent = `Selected: ${file.name}`;
const reader = new FileReader();
reader.onload = function(event) {
uploadedImageData = event.target.result;
document.getElementById('avatarPreview').innerHTML = `<img src="${uploadedImageData}" alt="Avatar">`;
};
reader.readAsDataURL(file);
}
});

function resetForm() {
document.getElementById('profileName').value = 'OG Believer';
document.getElementById('profileRole').value = 'Programmer and Developer';
document.getElementById('profileBio').value = 'Building the future, one commit at a time. Passionate about crafting seamless digital experiences with cutting-edge technology and minimalist design.';
document.getElementById('githubLink').value = 'https://github.com/believerrh';
document.getElementById('whatsappLink').value = 'https://wa.me/233534970884';
document.getElementById('avatarPreview').innerHTML = '👨‍💻';
uploadedImageData = null;
document.getElementById('fileName').textContent = '';
showStatus('Form reset to defaults', 'success');
}

function showStatus(message, type) {
const status = document.getElementById('status');
status.textContent = message;
status.className = `status ${type}`;
status.style.display = 'block';
setTimeout(() => { status.style.display = 'none'; }, 4000);
}

async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) throw new Error('Failed to load');
    currentProfile = await res.json();
    
    document.getElementById('profileName').value = currentProfile.name || 'OG Believer';
    document.getElementById('profileRole').value = currentProfile.role || 'Programmer and Developer';
    document.getElementById('profileBio').value = currentProfile.bio || '';
    document.getElementById('githubLink').value = currentProfile.github || 'https://github.com/believerrh';
    document.getElementById('whatsappLink').value = currentProfile.whatsapp || 'https://wa.me/233534970884';
    
    if (currentProfile.avatar) {
      uploadedImageData = currentProfile.avatar;
      document.getElementById('avatarPreview').innerHTML = `<img src="${currentProfile.avatar}" alt="Avatar">`;
      document.getElementById('fileName').textContent = 'Current avatar loaded';
    } else {
      document.getElementById('avatarPreview').innerHTML = '👨‍💻';
    }
  } catch (e) {
    console.log('Using default profile data');
  }
}

async function updateProfile() {
  const password = document.getElementById('adminPassword').value;
  if (!password) {
    showStatus('Please enter the admin password', 'error');
    return;
  }

  const data = {
    password,
    name: document.getElementById('profileName').value || 'Your Name',
    role: document.getElementById('profileRole').value || 'Developer',
    bio: document.getElementById('profileBio').value || '',
    avatar: uploadedImageData,
    github: document.getElementById('githubLink').value || 'https://github.com/username',
    whatsapp: document.getElementById('whatsappLink').value || 'https://wa.me/1234567890',
    stats: currentProfile?.stats || { projects: "42+", commits: "8.2K", online: "24/7" }
  };

  try {
    const res = await fetch('/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    const result = await res.json();
    if (!res.ok) throw new Error(result.error || 'Failed to update');
    
    currentProfile = { ...currentProfile, ...data };
    showStatus('✓ Profile updated successfully! Changes are live.', 'success');
  } catch (error) {
    showStatus('Error: ' + error.message, 'error');
  }
}

loadProfile();
</script>
</body>
</html>
