<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Profile — Nexus Link</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

:root {
--primary: #6366f1;
--secondary: #8b5cf6;
--accent: #06b6d4;
--dark: #0a0a0f;
--dark-surface: #12121a;
--text: #e2e8f0;
--text-muted: #94a3b8;
}

html {
scroll-behavior: smooth;
}

body {
font-family: 'Inter', system-ui, -apple-system, sans-serif;
background: var(--dark);
color: var(--text);
overflow-x: hidden;
min-height: 100vh;
line-height: 1.6;
}

#webgl-canvas {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 0;
}

#scanlines {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
z-index: 1;
pointer-events: none;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0, 0, 0, 0.03) 2px,
rgba(0, 0, 0, 0.03) 4px
);
}

.main-content {
position: relative;
z-index: 2;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
padding: 40px 20px;
}

.profile-wrapper {
perspective: 1200px;
width: 100%;
max-width: 580px;
margin-bottom: 50px;
}

.profile-card {
background: rgba(18, 18, 26, 0.7);
backdrop-filter: blur(40px) saturate(180%);
-webkit-backdrop-filter: blur(40px) saturate(180%);
border: 1px solid rgba(99, 102, 241, 0.2);
border-radius: 32px;
padding: 70px 55px;
text-align: center;
position: relative;
overflow: hidden;
transform-style: preserve-3d;
transition: transform 0.1s ease-out;
box-shadow:
0 30px 80px rgba(0, 0, 0, 0.6),
0 0 0 1px rgba(255, 255, 255, 0.05) inset,
0 2px 0 rgba(255, 255, 255, 0.1) inset;
}

.profile-card::before {
content: '';
position: absolute;
top: -2px;
left: -2px;
right: -2px;
bottom: -2px;
background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
border-radius: 34px;
z-index: -1;
opacity: 0.15;
filter: blur(20px);
}

.profile-card::after {
content: '';
position: absolute;
top: 0;
left: 0;
right: 0;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
}

.profile-grid {
display: grid;
grid-template-columns: auto 1fr;
gap: 40px;
align-items: center;
text-align: left;
}

.profile-left {
display: flex;
flex-direction: column;
align-items: center;
}

.profile-right {
display: flex;
flex-direction: column;
gap: 16px;
}

.profile-right .bio {
margin: 0 0 20px 0;
}

.profile-right .links {
justify-content: flex-start;
}

.profile-right h1 {
font-size: 2.4rem;
}

.profile-right .role {
margin-bottom: 0;
}

.avatar-container {
position: relative;
width: 160px;
height: 160px;
margin: 0 auto 35px;
}

.avatar-ring {
position: absolute;
inset: -8px;
border-radius: 50%;
background: conic-gradient(
from 0deg,
var(--primary),
var(--secondary),
var(--accent),
var(--primary)
);
animation: spin 4s linear infinite;
opacity: 0.6;
filter: blur(1px);
}

@keyframes spin {
to { transform: rotate(360deg); }
}

.avatar-ring::before {
content: '';
position: absolute;
inset: 2px;
border-radius: 50%;
background: var(--dark-surface);
}

.avatar {
width: 160px;
height: 160px;
border-radius: 50%;
background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
display: flex;
align-items: center;
justify-content: center;
font-size: 64px;
position: relative;
z-index: 1;
box-shadow:
0 0 60px rgba(102, 126, 234, 0.4),
0 0 120px rgba(118, 75, 162, 0.2);
animation: breathe 4s ease-in-out infinite;
overflow: hidden;
cursor: pointer;
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.avatar:hover {
transform: scale(1.05);
box-shadow:
0 0 80px rgba(102, 126, 234, 0.6),
0 0 160px rgba(118, 75, 162, 0.3);
}

.avatar.has-image {
background: transparent;
}

.avatar img {
width: 100%;
height: 100%;
object-fit: cover;
border-radius: 50%;
}

.avatar .emoji {
line-height: 1;
}

@keyframes breathe {
0%, 100% { box-shadow: 0 0 60px rgba(102, 126, 234, 0.4), 0 0 120px rgba(118, 75, 162, 0.2); }
50% { box-shadow: 0 0 80px rgba(102, 126, 234, 0.6), 0 0 160px rgba(118, 75, 162, 0.3); }
}

h1 {
font-size: 3rem;
font-weight: 700;
background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 50%, #94a3b8 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 8px;
letter-spacing: -1px;
position: relative;
display: inline-block;
}

h1::after {
content: '';
position: absolute;
left: 50%;
bottom: -8px;
transform: translateX(-50%);
width: 40px;
height: 2px;
background: linear-gradient(90deg, var(--primary), var(--accent));
border-radius: 2px;
}

.role {
display: inline-block;
font-family: 'JetBrains Mono', monospace;
font-size: 0.8rem;
color: var(--accent);
letter-spacing: 3px;
text-transform: uppercase;
margin-bottom: 35px;
padding: 8px 20px;
border: 1px solid rgba(6, 182, 212, 0.3);
border-radius: 20px;
background: rgba(6, 182, 212, 0.05);
position: relative;
}

.role::before {
content: '◆ ';
color: var(--accent);
opacity: 0.6;
}

.bio {
font-size: 1.05rem;
color: var(--text-muted);
line-height: 1.7;
max-width: 420px;
margin: 0 auto 45px;
font-weight: 300;
}

.stats {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 20px;
margin-bottom: 45px;
padding: 25px 0;
border-top: 1px solid rgba(255, 255, 255, 0.05);
border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.stat {
text-align: center;
}

.stat-value {
font-size: 1.5rem;
font-weight: 700;
background: linear-gradient(135deg, var(--primary), var(--accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
font-family: 'JetBrains Mono', monospace;
display: block;
margin-bottom: 4px;
}

.stat-label {
font-size: 0.7rem;
color: var(--text-muted);
letter-spacing: 1.5px;
text-transform: uppercase;
font-weight: 500;
}

.links {
display: flex;
gap: 16px;
justify-content: center;
flex-wrap: wrap;
}

.btn {
position: relative;
padding: 18px 40px;
border-radius: 16px;
text-decoration: none;
font-weight: 600;
font-size: 0.95rem;
letter-spacing: 0.3px;
transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
overflow: hidden;
display: inline-flex;
align-items: center;
gap: 12px;
border: 1px solid rgba(255, 255, 255, 0.1);
background: rgba(255, 255, 255, 0.03);
color: var(--text);
cursor: pointer;
}

.btn-primary {
background: linear-gradient(135deg, var(--primary), var(--secondary));
border-color: transparent;
box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
}

.btn-primary:hover {
transform: translateY(-4px) scale(1.02);
box-shadow: 0 16px 40px rgba(99, 102, 241, 0.4);
}

.btn-secondary:hover {
background: rgba(6, 182, 212, 0.1);
border-color: rgba(6, 182, 212, 0.3);
transform: translateY(-4px) scale(1.02);
box-shadow: 0 16px 40px rgba(6, 182, 212, 0.2);
}

.btn::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
transition: left 0.6s ease;
}

.btn:hover::before {
left: 100%;
}

.btn-icon {
width: 20px;
height: 20px;
}

.btn-icon svg {
width: 20px;
height: 20px;
fill: currentColor;
}

.footer {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%);
color: rgba(255, 255, 255, 0.3);
font-size: 0.75rem;
letter-spacing: 2px;
z-index: 2;
display: flex;
align-items: center;
gap: 8px;
}

.status-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: #10b981;
box-shadow: 0 0 10px #10b981;
animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

@media (max-width: 768px) {
.profile-grid {
grid-template-columns: 1fr;
text-align: center;
gap: 16px;
}

.profile-left {
flex-direction: row;
gap: 16px;
margin-bottom: 0;
justify-content: center;
}

.profile-right {
align-items: center;
gap: 8px;
}

.profile-right .bio {
margin: 0 0 12px 0;
}

.profile-right .links {
justify-content: center;
}

.avatar-container {
width: 130px;
height: 130px;
}

.avatar {
width: 130px;
height: 130px;
font-size: 52px;
overflow: hidden;
}

.profile-grid {
gap: 60px;
}

h1 {
font-size: 3.2rem;
}
}

@media (max-width: 640px) {
.profile-card {
padding: 40px 24px;
border-radius: 24px;
}

.stats {
gap: 10px;
}

.avatar-container {
width: 110px;
height: 110px;
}

.avatar {
width: 110px;
height: 110px;
font-size: 44px;
overflow: hidden;
}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(() => {
const canvas = document.getElementById('webgl-canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const createParticles = (count, spread) => {
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);

const colorPalette = [
new THREE.Color(0x6366f1),
new THREE.Color(0x8b5cf6),
new THREE.Color(0x06b6d4),
new THREE.Color(0xec4899)
];

for (let i = 0; i < count * 3; i += 3) {
positions[i] = (Math.random() - 0.5) * spread;
positions[i + 1] = (Math.random() - 0.5) * spread;
positions[i + 2] = (Math.random() - 0.5) * spread;
  
const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
colors[i] = color.r;
colors[i + 1] = color.g;
colors[i + 2] = color.b;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  
return geometry;
};

const particlesGeometry = createParticles(3000, 25);
const particlesMaterial = new THREE.PointsMaterial({
size: 0.03,
vertexColors: true,
transparent: true,
opacity: 0.8,
blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

const wireframeMaterial = (color, opacity) => new THREE.MeshBasicMaterial({
color,
wireframe: true,
transparent: true,
opacity
});

const shapes = [];
const shapeConfigs = [
{ geo: new THREE.IcosahedronGeometry(1.8, 1), color: 0x6366f1, opacity: 0.12, pos: [-6, 3, -5] },
{ geo: new THREE.OctahedronGeometry(1.2, 0), color: 0x8b5cf6, opacity: 0.1, pos: [7, -2, -4] },
{ geo: new THREE.TorusGeometry(1.5, 0.3, 8, 20), color: 0x06b6d4, opacity: 0.08, pos: [0, 4, -6] },
{ geo: new THREE.TetrahedronGeometry(1, 0), color: 0xec4899, opacity: 0.1, pos: [-4, -3, -3] },
{ geo: new THREE.TorusKnotGeometry(1.2, 0.3, 80, 16), color: 0x8b5cf6, opacity: 0.06, pos: [5, 3, -7] },
{ geo: new THREE.DodecahedronGeometry(1, 0), color: 0x6366f1, opacity: 0.08, pos: [-3, -4, -5] }
];

shapeConfigs.forEach(config => {
const mesh = new THREE.Mesh(config.geo, wireframeMaterial(config.color, config.opacity));
mesh.position.set(...config.pos);
mesh.userData = {
rotSpeed: {
x: (Math.random() - 0.5) * 0.008,
y: (Math.random() - 0.5) * 0.008,
z: (Math.random() - 0.5) * 0.005
},
floatSpeed: 0.5 + Math.random() * 0.5,
floatOffset: Math.random() * Math.PI * 2,
initialY: config.pos[1]
};
shapes.push(mesh);
scene.add(mesh);
});

const lights = [];
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);

const pointLight1 = new THREE.PointLight(0x6366f1, 2, 20);
pointLight1.position.set(5, 5, 5);
scene.add(pointLight1);
lights.push(pointLight1);

const pointLight2 = new THREE.PointLight(0x8b5cf6, 2, 20);
pointLight2.position.set(-5, -3, 3);
scene.add(pointLight2);
lights.push(pointLight2);

camera.position.z = 8;

let mouseX = 0;
let mouseY = 0;
let targetMouseX = 0;
let targetMouseY = 0;

document.addEventListener('mousemove', (event) => {
targetMouseX = (event.clientX / window.innerWidth - 0.5) * 2;
targetMouseY = (event.clientY / window.innerHeight - 0.5) * 2;
});

const card = document.getElementById('profileCard');

const PI = Math.PI;
const TAU = PI * 2;

const animate = () => {
requestAnimationFrame(animate);

mouseX += (targetMouseX - mouseX) * 0.05;
mouseY += (targetMouseY - mouseY) * 0.05;

const time = performance.now() * 0.001;

particles.rotation.y = time * 0.04;
particles.rotation.x = Math.sin(time * 0.05) * 0.1;

shapes.forEach((shape, i) => {
shape.rotation.x += shape.userData.rotSpeed.x;
shape.rotation.y += shape.userData.rotSpeed.y;
shape.rotation.z += shape.userData.rotSpeed.z;
  
shape.position.y = shape.userData.initialY +
Math.sin(time * shape.userData.floatSpeed + shape.userData.floatOffset) * 0.4;
});

lights.forEach((light, i) => {
const t = time * 0.3 + i * TAU / lights.length;
light.intensity = 1.8 + Math.sin(t) * 0.6;
});

camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.02;
camera.position.y += (-mouseY * 1.2 - camera.position.y) * 0.02;
camera.lookAt(0, 0, 0);

const cardRotateY = mouseX * 8;
const cardRotateX = -mouseY * 8;
card.style.transform = `
rotateX(${cardRotateX * 0.4}deg)
rotateY(${cardRotateY * 0.4}deg)
`;

renderer.render(scene, camera);
};

animate();

const handleResize = () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
};

window.addEventListener('resize', handleResize);

handleResize();
})();
</script>

<script>
async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    if (!res.ok) throw new Error('Failed to load');
    const data = await res.json();
    
    document.getElementById('profile-name').textContent = data.name || 'Your Name';
    document.getElementById('profile-role').textContent = data.role || 'Developer';
    document.getElementById('profile-bio').textContent = data.bio || '';
    document.getElementById('avatar').innerHTML = data.avatar 
      ? `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onclick="openLightbox('${data.avatar}')">` 
      : '👨‍💻';
    const avatarEl = document.getElementById('avatar');
    avatarEl.classList.toggle('has-image', !!data.avatar);
    avatarEl.onclick = data.avatar ? () => openLightbox(data.avatar) : null;
    
    const gh = document.getElementById('github-link');
    if (gh) gh.href = data.github || '#';
    const wa = document.getElementById('whatsapp-link');
    if (wa) wa.href = data.whatsapp || '#';
    
    if (data.stats) {
      const pe = document.getElementById('stat-projects');
      if (pe) pe.textContent = data.stats.projects || '42+';
      const ce = document.getElementById('stat-commits');
      if (ce) ce.textContent = data.stats.commits || '8.2K';
      const oe = document.getElementById('stat-online');
      if (oe) oe.textContent = data.stats.online || '24/7';
    }
  } catch (e) {
    console.log('Using default profile data');
  }
}
loadProfile();

function openLightbox(src) {
  const modal = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  modal.style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>

<div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; cursor:pointer;" onclick="closeLightbox()">
<img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border-radius:12px; box-shadow:0 0 40px rgba(0,0,0,0.8);">
</div>

</body>
</html>
